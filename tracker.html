<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>SafeTrack - Lacak Lokasi Pasangan</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            min-height: 85vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 25px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }
        .tab-bar {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            border: none;
            background: none;
            font-size: 16px;
        }
        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        .tab:not(.active) {
            color: #888;
        }
        .page {
            display: none;
            padding: 20px;
            flex: 1;
        }
        .page.active {
            display: block;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: 600;
            color: #333;
            display: block;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus {
            border-color: #667eea;
            outline: none;
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn-stop {
            background: #dc3545;
            margin-top: 10px;
        }
        .info-box {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 13px;
            color: #1565c0;
        }
        .status-box {
            background: #d4edda;
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
            display: none;
        }
        .status-box.show {
            display: block;
        }
        #map {
            height: 350px;
            border-radius: 16px;
            margin-bottom: 15px;
        }
        .track-info {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
            font-size: 13px;
        }
        .badge-online {
            background: #4caf50;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }
        .badge-offline {
            background: #f44336;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }
        .footer {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            font-size: 11px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💑 SafeTrack</h1>
            <p>Lacak lokasi pasangan dengan izin</p>
        </div>

        <div class="tab-bar">
            <button class="tab active" onclick="switchPage('share')">📍 SHARE</button>
            <button class="tab" onclick="switchPage('track')">🔍 LACAK</button>
        </div>

        <!-- HALAMAN SHARE -->
        <div id="sharePage" class="page active">
            <div class="input-group">
                <label>👤 Nama Kamu</label>
                <input type="text" id="namaUser" placeholder="Nama lo">
            </div>
            <div class="input-group">
                <label>❤️ Nama Pasangan</label>
                <input type="text" id="namaPacar" placeholder="Nama pasangan">
            </div>
            <div class="input-group">
                <label>🔑 Kode Ruangan</label>
                <input type="text" id="roomCode" placeholder="contoh: BIMA0210">
            </div>
            <button id="startBtn" onclick="startSharing()">📍 MULAI SHARE</button>
            <button id="stopBtn" class="btn-stop" onclick="stopSharing()" style="display:none;">🛑 STOP</button>
            <div id="shareStatus" class="status-box"></div>
            <div class="info-box">
                ⚠️ IZINKAN akses lokasi saat popup muncul.<br>
                ✅ Lokasi akan dikirim setiap 15 detik.
            </div>
        </div>

        <!-- HALAMAN LACAK -->
        <div id="trackPage" class="page">
            <div class="input-group">
                <label>🔑 Kode Ruangan Pasangan</label>
                <input type="text" id="trackRoomCode" placeholder="Masukkan kode dari pasangan">
            </div>
            <button onclick="startTracking()">🔍 MULAI LACAK</button>
            <div id="map"></div>
            <div class="track-info" id="trackInfo">
                <div id="trackName">—</div>
                <div id="trackStatus">Belum ada data</div>
                <div id="trackTime">—</div>
            </div>
        </div>

        <div class="footer">
            ⚠️ Hanya untuk digunakan dengan izin pasangan
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD2Vbrh_AwWDq2eEwPSKtV_p-Dh6oVJbKw",
            authDomain: "safetrack-d3b85.firebaseapp.com",
            databaseURL: "https://safetrack-d3b85-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "safetrack-d3b85",
            storageBucket: "safetrack-d3b85.firebasestorage.app",
            messagingSenderId: "510921235146",
            appId: "1:510921235146:web:bf218e8644e567a4fbb233"
        };

        let db;
        try {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.database();
        } catch(e) { alert("Firebase error: " + e.message); }

        let shareInterval, shareWatchId, isSharing = false, currentRoom = "";
        let trackMap, trackMarker, trackListener;

        function switchPage(page) {
            document.getElementById('sharePage').classList.toggle('active', page === 'share');
            document.getElementById('trackPage').classList.toggle('active', page === 'track');
            document.querySelectorAll('.tab').forEach((tab, i) => {
                tab.classList.toggle('active', (page === 'share' && i === 0) || (page === 'track' && i === 1));
            });
            if (page === 'track' && !trackMap) initMap();
            if (trackMap) setTimeout(() => trackMap.invalidateSize(), 200);
        }

        function startSharing() {
            const namaUser = document.getElementById('namaUser').value.trim();
            const namaPacar = document.getElementById('namaPacar').value.trim();
            const roomCode = document.getElementById('roomCode').value.trim();
            const statusDiv = document.getElementById('shareStatus');

            if (!namaUser || !namaPacar || !roomCode) {
                statusDiv.className = 'status-box show';
                statusDiv.style.background = '#f8d7da';
                statusDiv.innerHTML = '❌ Semua harus diisi!';
                return;
            }

            currentRoom = roomCode;
            statusDiv.className = 'status-box show';
            statusDiv.style.background = '#fff3cd';
            statusDiv.innerHTML = '📍 Meminta izin lokasi... IZINKAN popup!';

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    statusDiv.style.background = '#d4edda';
                    statusDiv.innerHTML = '✅ Izin diberikan! Mulai mengirim...';
                    
                    const sendLoc = () => {
                        navigator.geolocation.getCurrentPosition(p => {
                            db.ref('locations/' + roomCode).set({
                                nama: namaUser, pasangan: namaPacar,
                                lat: p.coords.latitude, lng: p.coords.longitude,
                                waktu: new Date().toISOString(), status: "aktif"
                            });
                        }, () => {});
                    };
                    sendLoc();
                    shareInterval = setInterval(sendLoc, 15000);
                    shareWatchId = navigator.geolocation.watchPosition(p => {
                        db.ref('locations/' + roomCode).set({
                            nama: namaUser, pasangan: namaPacar,
                            lat: p.coords.latitude, lng: p.coords.longitude,
                            waktu: new Date().toISOString(), status: "aktif"
                        });
                    }, () => {}, { enableHighAccuracy: true });
                    
                    isSharing = true;
                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('stopBtn').style.display = 'block';
                    localStorage.setItem('isSharing', 'true');
                    localStorage.setItem('roomCode', roomCode);
                    localStorage.setItem('namaUser', namaUser);
                    localStorage.setItem('namaPacar', namaPacar);
                },
                (err) => {
                    statusDiv.style.background = '#f8d7da';
                    statusDiv.innerHTML = '❌ Izin lokasi ditolak! Klik IZINKAN di popup.';
                }
            );
        }

        function stopSharing() {
            if (shareInterval) clearInterval(shareInterval);
            if (shareWatchId) navigator.geolocation.clearWatch(shareWatchId);
            if (db && currentRoom) db.ref('locations/' + currentRoom).update({ status: "stopped" });
            isSharing = false;
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('shareStatus').innerHTML = '🛑 Sharing dihentikan.';
            localStorage.removeItem('isSharing');
        }

        function initMap() {
            trackMap = L.map('map').setView([-6.2088, 106.8456], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OSM'
            }).addTo(trackMap);
        }

        function startTracking() {
            const roomCode = document.getElementById('trackRoomCode').value.trim();
            if (!roomCode) return alert('Masukkan kode ruangan!');
            if (!trackMap) initMap();
            if (trackListener) trackListener.off();
            const ref = db.ref('locations/' + roomCode);
            trackListener = ref.on('value', snap => {
                const d = snap.val();
                if (d && d.lat) {
                    document.getElementById('trackName').innerHTML = `👤 ${d.nama || 'Pasangan'}`;
                    document.getElementById('trackStatus').innerHTML = d.status === 'aktif' ? '<span class="badge-online">✅ LIVE</span>' : '<span class="badge-offline">⚠️ OFFLINE</span>';
                    document.getElementById('trackTime').innerHTML = `🕐 ${new Date(d.waktu).toLocaleTimeString()}`;
                    if (trackMarker) trackMarker.setLatLng([d.lat, d.lng]);
                    else trackMarker = L.marker([d.lat, d.lng]).addTo(trackMap);
                    trackMarker.bindPopup(`${d.nama}<br>${d.lat}, ${d.lng}`).openPopup();
                    trackMap.setView([d.lat, d.lng], 15);
                } else {
                    document.getElementById('trackStatus').innerHTML = '⏳ Belum ada lokasi';
                }
            });
        }

        if (localStorage.getItem('isSharing') === 'true') {
            document.getElementById('namaUser').value = localStorage.getItem('namaUser') || '';
            document.getElementById('namaPacar').value = localStorage.getItem('namaPacar') || '';
            document.getElementById('roomCode').value = localStorage.getItem('roomCode') || '';
            setTimeout(startSharing, 500);
        }
    </script>
</body>
</html>
